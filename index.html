<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Trainer</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background: #eef2f7;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: white;
    padding: 18px;
    box-sizing: border-box;
  }

  h1 {
    text-align: center;
    font-size: 22px;
    margin: 10px 0;
  }

  select {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .card {
    background: white;
    border-radius: 18px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    margin-top: 10px;
  }

  #number {
    font-size: 72px;
    font-weight: 700;
    transition: transform 0.15s ease;
  }

  .pop { transform: scale(1.2); }

  #timer {
    font-size: 16px;
    margin-top: 6px;
    color: #555;
  }

  .warning { color: #d93025; font-weight: bold; }

  .buttons {
    display: flex;
    gap: 12px;
    margin-top: 15px;
  }

  button {
    flex: 1;
    padding: 16px;
    font-size: 18px;
    border: none;
    border-radius: 14px;
    font-weight: 600;
  }

  .primeBtn {
    background: #2563eb;
    color: white;
  }

  .notPrimeBtn {
    background: #f59e0b;
    color: white;
  }

  button:active {
    transform: scale(0.96);
  }

  #result {
    font-size: 18px;
    margin-top: 10px;
    height: 24px;
  }

  .stats {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-top: 10px;
    color: #444;
  }

  .panel {
    margin-top: 14px;
    background: #f7f9fc;
    padding: 12px;
    border-radius: 14px;
  }

  .item {
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid #e8e8e8;
  }

  .prime { color: #1d4ed8; font-weight: 600; }
  .not-prime { color: #d97706; font-weight: 600; }

  .factor {
    color: #111;
    font-size: 12px;
    margin-top: 2px;
    display: block;
    opacity: 0.75;
  }

</style>
</head>

<body>

<div class="app">

<h1>🔢 Prime Trainer</h1>

<select id="mode" onchange="resetGame()">
  <option value="balanced">Balanced Mode</option>
  <option value="natural">Natural Distribution</option>
  <option value="primes">Prime Training</option>
  <option value="adaptive">Adaptive Difficulty</option>
</select>

<div class="card">

  <div id="number">--</div>
  <div id="timer">Time: 5</div>

  <div class="buttons">
    <button class="primeBtn" onclick="answer(true)">Prime</button>
    <button class="notPrimeBtn" onclick="answer(false)">Not Prime</button>
  </div>

  <div id="result"></div>

</div>

<div class="stats">
  <div>🔥 Streak: <span id="streak">0</span></div>
  <div>🏆 Best: <span id="best">0</span></div>
</div>

<div class="panel">
  <b>📜 Learning History</b>
  <div id="history"></div>
</div>

<div class="panel">
  <b>🥇 Leaderboard</b>
  <div id="lb"></div>
</div>

</div>

<script>

let current = 0;
let streak = 0;
let best = 0;
let timer;
let time = 5;
let adaptive = 1;

let leaderboard = JSON.parse(localStorage.getItem("lb")) || [];

function isPrime(n) {
  if (n < 2) return false;
  for (let i = 2; i <= Math.sqrt(n); i++) {
    if (n % i === 0) return false;
  }
  return true;
}

/* FACTORIZATION */
function factorize(n) {
  let res = [];
  let x = n;

  for (let i = 2; i <= Math.sqrt(x); i++) {
    while (x % i === 0) {
      res.push(i);
      x /= i;
    }
  }

  if (x > 1) res.push(x);
  return res;
}

/* GENERATION */
function generate() {
  const mode = document.getElementById("mode").value;

  if (mode === "balanced") {
    current = Math.random() < 0.5 ? randPrime() : randNonPrime();
  }
  else if (mode === "natural") {
    current = Math.floor(Math.random() * 150) + 1;
  }
  else if (mode === "primes") {
    current = randPrime();
  }
  else {
    const max = Math.min(50 + adaptive * 20, 150);
    current = Math.floor(Math.random() * max) + 1;
  }

  document.getElementById("number").textContent = current;
  pop();
  startTimer();
}

/* RANDOM */
function randPrime() {
  let arr = [];
  for (let i = 2; i <= 150; i++) {
    if (isPrime(i)) arr.push(i);
  }
  return arr[Math.floor(Math.random() * arr.length)];
}

function randNonPrime() {
  let n;
  do {
    n = Math.floor(Math.random() * 150) + 1;
  } while (isPrime(n));
  return n;
}

/* GAME */
function answer(userGuess) {
  clearInterval(timer);

  const actual = isPrime(current);
  const correct = userGuess === actual;

  if (correct) {
    streak++;
    document.getElementById("result").textContent = "✅ Correct!";
  } else {
    saveScore();
    streak = 0;
    document.getElementById("result").textContent = "❌ Wrong!";
  }

  if (streak > best) best = streak;

  if (document.getElementById("mode").value === "adaptive") {
    adaptive++;
  }

  addHistory(actual, correct, userGuess);
  update();

  setTimeout(generate, 650);
}

/* TIMER */
function startTimer() {
  clearInterval(timer);
  time = 5;

  timer = setInterval(() => {
    time--;
    const t = document.getElementById("timer");
    t.textContent = "Time: " + time;

    t.classList.toggle("warning", time <= 2);

    if (time <= 0) {
      clearInterval(timer);
      streak = 0;
      document.getElementById("result").textContent = "⏱ Time up!";
      update();
      setTimeout(generate, 650);
    }
  }, 1000);
}

/* HISTORY */
function addHistory(actual, correct, userGuess) {
  const div = document.createElement("div");
  div.className = "item";

  let factorText = "";

  // ONLY show factorization when player says "Prime" but it's wrong
  if (userGuess === true && actual === false) {
    const f = factorize(current);
    factorText = `<span class="factor">Factors: ${f.join(" × ")}</span>`;
  }

  div.innerHTML = `
    <span class="${actual ? "prime" : "not-prime"}">
      ${current} (${actual ? "Prime" : "Not Prime"})
    </span>
    — ${correct ? "Correct" : "Wrong"}
    ${factorText}
  `;

  document.getElementById("history").prepend(div);

  if (document.getElementById("history").children.length > 8) {
    document.getElementById("history").removeChild(
      document.getElementById("history").lastChild
    );
  }
}

/* LEADERBOARD */
function saveScore() {
  leaderboard.push(streak);
  leaderboard.sort((a,b)=>b-a);
  leaderboard = leaderboard.slice(0,5);
  localStorage.setItem("lb", JSON.stringify(leaderboard));
  renderLB();
}

function renderLB() {
  const lb = document.getElementById("lb");
  lb.innerHTML = "";

  leaderboard.forEach((s,i)=>{
    const d = document.createElement("div");
    d.className = "item";
    d.textContent = `${i+1}. ${s}`;
    lb.appendChild(d);
  });
}

/* UI */
function update() {
  document.getElementById("streak").textContent = streak;
  document.getElementById("best").textContent = best;
}

function pop() {
  const el = document.getElementById("number");
  el.classList.add("pop");
  setTimeout(()=>el.classList.remove("pop"),150);
}

function resetGame() {
  streak = 0;
  adaptive = 1;
  update();
  generate();
}

renderLB();
generate();

</script>

</body>
</html>
